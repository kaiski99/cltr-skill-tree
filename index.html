<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLTR Protocol — Skill Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06060c;
    --bg2: #0c0c16;
    --bg3: #12121e;
    --border: #1a1a2e;
    --text: #c0c0d0;
    --text-dim: #4a4a66;
    --text-bright: #e8e8f4;
    --gold: #c9a84c;
    --gold-glow: rgba(201,168,76,0.35);
    --cyan: #00d4ff;
    --cyan-glow: rgba(0,212,255,0.3);
    --purple: #8b5cf6;
    --purple-glow: rgba(139,92,246,0.3);
    --green: #00ff88;
    --green-glow: rgba(0,255,136,0.25);
    --red: #ff3366;
    --red-glow: rgba(255,51,102,0.3);
    --orange: #ff8800;
    --pink: #ec4899;
    --hex-size: 44px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Background */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0,212,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(139,92,246,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(12,12,22,0.8) 0%, var(--bg) 80%);
  }
  .bg-grid::after {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0H0v40' fill='none' stroke='%23ffffff' stroke-width='0.2' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 9999; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: var(--cyan); letter-spacing: 6px; text-shadow: 0 0 30px var(--cyan-glow); }
  .loading-bar { width: 200px; height: 2px; background: #111; border-radius: 1px; overflow: hidden; }
  .loading-bar-fill { height: 100%; width: 30%; background: var(--cyan); border-radius: 1px; animation: load-pulse 1s ease-in-out infinite; }
  @keyframes load-pulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
  .loading-text { font-size: 9px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

  /* Top bar */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, rgba(6,6,12,0.95) 0%, rgba(6,6,12,0.85) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: var(--cyan); letter-spacing: 4px; text-shadow: 0 0 16px var(--cyan-glow); }
  .logo-sub { font-family: 'Orbitron', sans-serif; font-size: 8px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
  .sync-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 8px; color: var(--text-dim); padding: 3px 8px;
    border: 1px solid var(--border); border-radius: 3px;
    background: rgba(6,6,12,0.8); cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .sync-badge:hover { border-color: var(--cyan); color: var(--text); }
  .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--cyan); animation: spin 0.6s linear infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .top-stats { display: flex; gap: 20px; align-items: center; }
  .stat { text-align: center; }
  .stat-value { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-bright); }
  .stat-label { font-size: 7px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 1px; }
  .progress-wrap { text-align: center; }
  .progress-bar { width: 100px; height: 4px; background: #111; border-radius: 2px; overflow: hidden; border: 1px solid #1a1a28; }
  .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.6s; box-shadow: 0 0 8px var(--cyan-glow); }

  /* Layout */
  .app-layout { display: flex; height: calc(100vh - 46px); margin-top: 46px; position: relative; z-index: 1; }

  /* Quest sidebar */
  .quest-panel {
    width: 260px; min-width: 260px;
    background: linear-gradient(180deg, rgba(12,12,22,0.95) 0%, rgba(6,6,12,0.98) 100%);
    border-right: 1px solid var(--border);
    padding: 16px 14px; overflow-y: auto;
  }
  .quest-header { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; text-shadow: 0 0 10px var(--cyan-glow); }
  .quest-sub { font-size: 9px; color: var(--text-dim); margin-bottom: 14px; letter-spacing: 0.5px; }
  .quest-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .quest-card::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 2px; }
  .quest-card.q0::before { background: var(--red); }
  .quest-card.q1::before { background: var(--gold); }
  .quest-card.q2::before { background: var(--cyan); }
  .quest-card:hover { border-color: #2a2a44; transform: translateX(2px); }
  .quest-rank { font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
  .quest-card.q0 .quest-rank { color: var(--red); }
  .quest-card.q1 .quest-rank { color: var(--gold); }
  .quest-card.q2 .quest-rank { color: var(--cyan); }
  .quest-name { font-size: 11px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; line-height: 1.3; }
  .quest-reason { font-size: 9px; color: var(--text-dim); line-height: 1.35; margin-bottom: 6px; }
  .quest-bar-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .quest-bar { flex: 1; height: 3px; background: #111; border-radius: 2px; overflow: hidden; }
  .quest-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .quest-bar-label { font-family: 'Orbitron', sans-serif; font-size: 7px; color: var(--text-dim); font-weight: 600; }
  .quest-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .quest-tag { font-size: 7px; padding: 1px 5px; border-radius: 2px; font-weight: 600; letter-spacing: 0.3px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: var(--text-dim); }
  .quest-divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* Legend */
  .legend-title { font-family: 'Orbitron', sans-serif; font-size: 8px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 9px; color: var(--text-dim); margin-bottom: 5px; }

  /* Tree canvas */
  .tree-area { flex: 1; overflow: auto; position: relative; }
  .tree-viewport { position: relative; min-width: 100%; min-height: 100%; }

  /* SVG connections layer */
  .tree-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
  .conn { fill: none; stroke-width: 2; stroke-linecap: round; transition: opacity 0.3s; }
  .conn.locked { stroke: #151520; stroke-dasharray: 4 3; opacity: 0.5; }
  .conn.ready { stroke: #2a2a44; opacity: 0.6; }
  .conn.active { stroke: var(--cyan); opacity: 0.7; filter: drop-shadow(0 0 3px var(--cyan-glow)); }
  .conn.done { stroke: var(--green); opacity: 0.5; }
  .conn.critical { stroke: var(--red); opacity: 0.7; stroke-width: 2.5; filter: drop-shadow(0 0 4px var(--red-glow)); }

  /* Node */
  .tree-node {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: transform 0.2s, filter 0.3s;
    z-index: 2; user-select: none;
  }
  .tree-node:hover { transform: scale(1.08); z-index: 10; }
  .tree-node:hover .hex-label { color: var(--text-bright); }

  /* Hexagon frame */
  .hex-frame {
    width: 88px; height: 88px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .hex-bg { position: absolute; inset: 0; }
  .hex-bg polygon { fill: var(--bg2); stroke: var(--border); stroke-width: 2; transition: all 0.3s; }
  .hex-icon { position: relative; z-index: 2; width: 36px; height: 36px; }
  .hex-icon svg { width: 100%; height: 100%; }
  .hex-icon svg path, .hex-icon svg circle, .hex-icon svg rect, .hex-icon svg line,
  .hex-icon svg polyline, .hex-icon svg polygon, .hex-icon svg ellipse { transition: all 0.3s; }

  /* Status styles */
  .tree-node[data-status="Locked"] { opacity: 0.35; filter: grayscale(0.8); }
  .tree-node[data-status="Locked"] .hex-bg polygon { fill: #0a0a12; stroke: #151520; }
  .tree-node[data-status="Locked"] .hex-icon svg * { stroke: #2a2a3a !important; fill: none !important; }

  .tree-node[data-status="Not Started"] .hex-bg polygon { fill: var(--bg2); stroke: #2a2a44; stroke-width: 2; }
  .tree-node[data-status="Not Started"] .hex-icon svg * { stroke: #556 !important; }

  .tree-node[data-status="In Progress"] .hex-bg polygon {
    fill: rgba(0,212,255,0.06); stroke: var(--cyan); stroke-width: 2.5;
    filter: drop-shadow(0 0 8px var(--cyan-glow));
    animation: hex-glow 3s ease-in-out infinite;
  }
  @keyframes hex-glow {
    0%,100% { filter: drop-shadow(0 0 8px var(--cyan-glow)); }
    50% { filter: drop-shadow(0 0 16px var(--cyan-glow)); }
  }
  .tree-node[data-status="In Progress"] .hex-icon svg * { stroke: var(--cyan) !important; }

  .tree-node[data-status="Done"] .hex-bg polygon {
    fill: rgba(0,255,136,0.06); stroke: var(--green); stroke-width: 2;
    filter: drop-shadow(0 0 6px var(--green-glow));
  }
  .tree-node[data-status="Done"] .hex-icon svg * { stroke: var(--green) !important; }

  .tree-node[data-status="Shipped"] .hex-bg polygon {
    fill: rgba(201,168,76,0.06); stroke: var(--gold); stroke-width: 2.5;
    filter: drop-shadow(0 0 8px var(--gold-glow));
  }
  .tree-node[data-status="Shipped"] .hex-icon svg * { stroke: var(--gold) !important; }

  /* Branch dot */
  .branch-dot {
    position: absolute; top: 6px; right: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--bg2); z-index: 3;
  }

  /* Label */
  .hex-label {
    font-size: 8px; font-weight: 600; color: var(--text-dim);
    text-align: center; margin-top: 2px; max-width: 100px;
    line-height: 1.2; letter-spacing: 0.2px; transition: color 0.2s;
  }

  /* Progress under node */
  .hex-progress { width: 48px; margin-top: 3px; display: flex; flex-direction: column; align-items: center; }
  .hex-pbar { width: 100%; height: 3px; background: #0e0e18; border-radius: 2px; overflow: hidden; border: 1px solid #151520; }
  .hex-pfill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .hex-plabel { font-family: 'Orbitron', sans-serif; font-size: 6px; color: var(--text-dim); margin-top: 1px; font-weight: 500; }

  /* Detail panel */
  /* Modal overlay */
  .detail-overlay { position: fixed; inset: 0; z-index: 190; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(6px); }
  .detail-overlay.open { opacity: 1; pointer-events: auto; }

  /* Centered modal */
  .detail-panel {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    width: 580px; max-width: 92vw; max-height: 85vh;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px;
    z-index: 200; overflow-y: auto; padding: 28px 32px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 60px rgba(0,212,255,0.04);
  }
  .detail-panel.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
  .detail-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.2s;
  }
  .detail-close:hover { border-color: var(--cyan); color: #fff; }

  /* Modal header */
  .detail-branch { display: inline-block; font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 600; padding: 2px 7px; border-radius: 2px; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .detail-title { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; line-height: 1.3; }
  .detail-phase { font-size: 10px; color: var(--text-dim); margin-bottom: 16px; }

  /* Two-column layout inside modal */
  .detail-columns { display: flex; gap: 24px; }
  .detail-col-left { flex: 1; min-width: 0; }
  .detail-col-right { flex: 1; min-width: 0; }

  /* Progress section */
  .detail-progress-section { margin-bottom: 18px; }
  .detail-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .detail-progress-label { font-family: 'Orbitron', sans-serif; font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }
  .detail-progress-value { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; }
  .detail-pbar { width: 100%; height: 8px; background: #0e0e18; border-radius: 4px; overflow: hidden; border: 1px solid #1a1a28; }
  .detail-pfill { height: 100%; border-radius: 4px; transition: width 0.5s; }

  /* Progress checklist */
  .progress-checklist { margin-top: 10px; }
  .checklist-group-title { font-family: 'Orbitron', sans-serif; font-size: 7px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 5px; margin-top: 10px; font-weight: 600; }
  .checklist-group-title:first-child { margin-top: 0; }
  .checklist-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; margin-bottom: 3px;
    border-radius: 3px; font-size: 11px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.03);
    transition: background 0.2s;
  }
  .checklist-item:hover { background: rgba(255,255,255,0.04); }
  .checklist-item.done { opacity: 0.7; }
  .checklist-item.done .checklist-text { text-decoration: line-through; color: var(--text-dim); }
  .checklist-icon {
    width: 16px; height: 16px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
  }
  .checklist-icon.done { background: rgba(0,255,136,0.12); color: var(--green); }
  .checklist-icon.pending { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08); }
  .checklist-icon.active { background: rgba(0,212,255,0.12); color: var(--cyan); }
  .checklist-text { color: var(--text); flex: 1; }
  .checklist-status { font-size: 8px; font-weight: 600; letter-spacing: 0.5px; padding: 1px 5px; border-radius: 2px; }
  .checklist-status.done { background: rgba(0,255,136,0.1); color: var(--green); }
  .checklist-status.active { background: rgba(0,212,255,0.1); color: var(--cyan); }
  .checklist-status.pending { background: rgba(255,255,255,0.04); color: var(--text-dim); }
  .checklist-clickable { cursor: pointer; }
  .checklist-clickable:hover { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.15); }

  /* Info rows */
  .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(26,26,46,0.4); }
  .detail-row-label { font-size: 10px; color: var(--text-dim); }
  .detail-row-value { font-size: 10px; color: #fff; font-weight: 600; }
  .detail-section { margin-bottom: 12px; }
  .detail-section-title { font-family: 'Orbitron', sans-serif; font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
  .detail-section-content { font-size: 11px; color: var(--text); line-height: 1.5; }
  .detail-dep-item {
    font-size: 10px; padding: 3px 7px;
    background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.12);
    border-radius: 3px; color: #a78bfa; cursor: pointer; transition: all 0.2s; margin-bottom: 3px;
  }
  .detail-dep-item:hover { background: rgba(139,92,246,0.12); }
  .detail-unlock-item {
    font-size: 10px; padding: 3px 7px;
    background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.12);
    border-radius: 3px; color: var(--green); cursor: pointer; transition: all 0.2s; margin-bottom: 3px;
  }
  .detail-unlock-item:hover { background: rgba(0,255,136,0.12); }
  .blocker-badge { font-size: 10px; padding: 5px 8px; background: rgba(255,51,102,0.08); border: 1px solid rgba(255,51,102,0.15); border-radius: 3px; color: var(--red); line-height: 1.4; }

  @media (max-width: 700px) {
    .detail-columns { flex-direction: column; gap: 12px; }
    .detail-panel { padding: 20px 16px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }

  @media (max-width: 900px) {
    .quest-panel { display: none; }
    .top-stats { display: none; }
    .detail-panel { width: 95vw; max-height: 90vh; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">CLTR</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-text">Initializing skill tree...</div>
</div>

<div class="top-bar">
  <div class="top-left">
    <div><div class="logo">CLTR</div><div class="logo-sub">Skill Tree</div></div>
    <div class="sync-badge" onclick="fetchNodes()">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Live</span>
    </div>
  </div>
  <div class="top-stats">
    <div class="stat"><div class="stat-value" id="statNodes">&mdash;</div><div class="stat-label">Nodes</div></div>
    <div class="stat"><div class="stat-value" id="statActive">&mdash;</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-value" id="statDone">&mdash;</div><div class="stat-label">Done</div></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="stat-label" style="margin-top:2px"><span id="statPct">0</span>%</div>
    </div>
  </div>
</div>

<div class="app-layout">
  <div class="quest-panel">
    <div class="quest-header">Daily Quests</div>
    <div class="quest-sub">3 recommended focus areas</div>
    <div id="questList"></div>
    <div class="quest-divider"></div>
    <div class="legend-title">Status</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,4 13,10 7,13 1,10 1,4" fill="#0a0a12" stroke="#151520" stroke-width="1.5"/></svg> Locked</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,4 13,10 7,13 1,10 1,4" fill="var(--bg2)" stroke="#2a2a44" stroke-width="1.5"/></svg> Not Started</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,4 13,10 7,13 1,10 1,4" fill="rgba(0,212,255,0.08)" stroke="var(--cyan)" stroke-width="1.5"/></svg> In Progress</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,4 13,10 7,13 1,10 1,4" fill="rgba(0,255,136,0.08)" stroke="var(--green)" stroke-width="1.5"/></svg> Done</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,4 13,10 7,13 1,10 1,4" fill="rgba(201,168,76,0.08)" stroke="var(--gold)" stroke-width="1.5"/></svg> Shipped</div>
    <div class="quest-divider"></div>
    <div class="legend-title">Branches</div>
    <div class="legend-item"><div style="width:8px;height:8px;border-radius:50%;background:var(--pink)"></div> Design & Brand</div>

// Hex points
function hexPath(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) { const a = (Math.PI/3)*i - Math.PI/2; pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
  return pts.join(' ');
}

function getProgress(n) { const m={'Shipped':5,'Done':5,'In Progress':3,'Not Started':0,'Locked':0}; return {cur:m[n.status]||0,max:5}; }
function getProgressPct(n) { const p=getProgress(n); return (p.cur/p.max)*100; }

// ===== LAYOUT =====
function computeLayout(nodes) {
  const map = {}; nodes.forEach(n => map[n.id] = n);
  const depths = {};
  function getDepth(id, vis = new Set()) {
    if (depths[id] !== undefined) return depths[id];
    if (vis.has(id)) return 0; vis.add(id);
    const n = map[id];
    if (!n || !n.depends || !n.depends.length) { depths[id] = 0; return 0; }
    let mx = 0;
    n.depends.forEach(d => { if (map[d]) mx = Math.max(mx, getDepth(d, new Set(vis)) + 1); });
    depths[id] = mx; return mx;
  }
  nodes.forEach(n => getDepth(n.id));

  const layers = {};
  nodes.forEach(n => { const d = depths[n.id]||0; if (!layers[d]) layers[d]=[]; layers[d].push(n); });

  const branchOrder = ["Design & Brand","Core Product","Operations","GTM & Marketing","Token & DeFi","Multi-Category"];
  Object.values(layers).forEach(l => l.sort((a,b) => branchOrder.indexOf(a.branch) - branchOrder.indexOf(b.branch)));

  const nodeW = 130; const layerH = 150; const pad = { x: 80, y: 60 };
  const positions = {};

  Object.keys(layers).sort((a,b) => a-b).forEach(depth => {
    const layer = layers[depth];
    const layerWidth = Math.max(layer.length * nodeW, 500);
    layer.forEach((n, i) => {
      positions[n.id] = {
        x: pad.x + (layerWidth / (layer.length + 1)) * (i + 1),
        y: pad.y + depth * layerH
      };
    });
  });

  const allX = Object.values(positions).map(p => p.x);
  const allY = Object.values(positions).map(p => p.y);
  return { positions, w: Math.max(...allX) + 160, h: Math.max(...allY) + 180 };
}

// ===== RENDER =====
function renderTree() {
  if (!nodes.length) return;
  const { positions, w, h } = computeLayout(nodes);
  const vp = document.getElementById('treeViewport');
  const svg = document.getElementById('treeSvg');
  vp.style.width = w+'px'; vp.style.height = h+'px';
  svg.setAttribute('width', w); svg.setAttribute('height', h);

  // Connections
  let svgH = `<defs>
    <marker id="aD" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="4" markerHeight="4" orient="auto"><path d="M0,0 L6,3 L0,6" fill="var(--green)" opacity="0.5"/></marker>
    <marker id="aA" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="4" markerHeight="4" orient="auto"><path d="M0,0 L6,3 L0,6" fill="var(--cyan)" opacity="0.7"/></marker>
  </defs>`;

  nodes.forEach(n => {
    if (!n.depends || !positions[n.id]) return;
    n.depends.forEach(depId => {
      if (!positions[depId]) return;
      const f = positions[depId], t = positions[n.id];
      const dep = nodeMap[depId];
      const depDone = dep && (dep.status==='Done'||dep.status==='Shipped');
      const active = n.status==='In Progress';
      const crit = n.priority==='Critical Path' && active;
      let cls='locked', mk='';
      if (depDone && active) { cls='active'; mk='url(#aA)'; }
      else if (depDone) { cls='done'; mk='url(#aD)'; }
      else if (n.status==='Not Started'||active) cls='ready';
      if (crit) cls='critical';
      const my = (f.y+t.y)/2;
      svgH += `<path class="conn ${cls}" d="M${f.x},${f.y+44} C${f.x},${my} ${t.x},${my} ${t.x},${t.y-10}" ${mk?`marker-end="${mk}"`:''}/>`;
    });
  });
  svg.innerHTML = svgH;

  // Nodes
  vp.querySelectorAll('.tree-node').forEach(e => e.remove());
  let nh = '';
  nodes.forEach(n => {
    if (!positions[n.id]) return;
    const p = positions[n.id], c = branchColors[n.branch]||'#888';
    const prog = getProgress(n), pct = getProgressPct(n);
    nh += `<div class="tree-node" data-status="${n.status}" data-id="${n.id}" style="left:${p.x-56}px;top:${p.y-44}px;width:112px;" onclick="openDetail(nodeMap['${n.id}'])">
      <div class="hex-frame">
        <svg class="hex-bg" viewBox="0 0 88 88" width="88" height="88"><polygon points="${hexPath(44,44,40)}"/></svg>
        <div class="branch-dot" style="background:${c}"></div>
        <div class="hex-icon">${getIcon(n.id)}</div>
      </div>
      <div class="hex-label">${n.name}</div>
      <div class="hex-progress">
        <div class="hex-pbar"><div class="hex-pfill" style="width:${pct}%;background:${c}"></div></div>
        <div class="hex-plabel">${prog.cur}/${prog.max}</div>
      </div>
    </div>`;
  });
  vp.insertAdjacentHTML('beforeend', nh);
}

// ===== QUESTS =====
function renderQuests() {
  const list = document.getElementById('questList');
  const seed = new Date(); const ds = seed.getFullYear()*10000+(seed.getMonth()+1)*100+seed.getDate();
  const ps = {'Critical Path':100,'High':75,'Medium':50,'Low':25};
  const cands = nodes.filter(n => {
    if (n.status==='In Progress') return true;
    if (n.status==='Not Started') return !n.depends||!n.depends.length||n.depends.every(d=>{const dep=nodeMap[d];return dep&&(dep.status==='Done'||dep.status==='Shipped');});
    return false;
  });
  const scored = cands.map((n,i) => {
    let s = ps[n.priority]||50;
    if (n.status==='In Progress') s+=50;
    s += (n.unlocks?.length||0)*12;
    s += ((ds*(i+1)*7)%15);
    return {node:n,score:s};
  }).sort((a,b) => b.score-a.score).slice(0,3);

  if (!scored.length) { list.innerHTML='<div style="color:var(--text-dim);font-size:10px;padding:8px 0">No actionable quests.</div>'; return; }
  const labels = ['Primary Focus','Secondary','Bonus Quest'];
  list.innerHTML = scored.map((item,i) => {
    const n=item.node, prog=getProgress(n), c=branchColors[n.branch]||'#888';
    const reason = n.status==='In Progress'?'In progress — keep pushing':'Ready — all deps cleared';
    return `<div class="quest-card q${i}" onclick="openDetail(nodeMap['${n.id}'])">
      <div class="quest-rank">${labels[i]}</div>
      <div class="quest-name">${n.name}</div>
      <div class="quest-reason">${reason}</div>
      <div class="quest-bar-wrap"><div class="quest-bar"><div class="quest-bar-fill" style="width:${getProgressPct(n)}%;background:${c}"></div></div><span class="quest-bar-label">${prog.cur}/${prog.max}</span></div>
      <div class="quest-tags"><span class="quest-tag" style="color:${c}">${n.branch}</span><span class="quest-tag">${n.priority}</span>${n.unlocks?.length?`<span class="quest-tag" style="color:var(--green)">Unlocks ${n.unlocks.length}</span>`:''}</div>
    </div>`;
  }).join('');
}

function updateStats(s) {
  if (!s) return;
  document.getElementById('statNodes').textContent=s.total;
  document.getElementById('statActive').textContent=s.active;
  document.getElementById('statDone').textContent=s.done;
  document.getElementById('statPct').textContent=s.progress;
  document.getElementById('progressFill').style.width=Math.max(s.progress,2)+'%';
}

async function fetchNodes() {
  const dot=document.getElementById('syncDot'), txt=document.getElementById('syncText');
  dot.classList.add('syncing'); txt.textContent='Syncing...';
  try {
    const res=await fetch(API_URL), data=await res.json();
    if (!data.ok) throw new Error(data.error);
    nodes=data.nodes; nodeMap={}; nodes.forEach(n=>nodeMap[n.id]=n);
    renderTree(); renderQuests(); updateStats(data.stats);
    dot.classList.remove('syncing','error');
    txt.textContent=`Synced ${new Date(data.lastSync).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('loadingOverlay').classList.add('hidden');
    if (selectedNode) { const u=nodeMap[selectedNode.id]; if(u) openDetail(u); }
  } catch(e) {
    console.error('Sync failed:',e);
    dot.classList.remove('syncing'); dot.classList.add('error'); txt.textContent='Error';
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

function buildProgressChecklist(node) {
  // Build detailed progress items from deps + milestones
  const items = [];

  // 1) Dependency items
  if (node.depends && node.depends.length > 0) {
    node.depends.forEach(depId => {
      const dep = nodeMap[depId];
      if (!dep) return;
      const isDone = dep.status === 'Done' || dep.status === 'Shipped';
      const isActive = dep.status === 'In Progress';
      items.push({
        text: dep.name,
        status: isDone ? 'done' : isActive ? 'active' : 'pending',
        group: 'dependencies',
        clickId: depId
      });
    });
  }

  // 2) Task milestone items (derived from status)
  const milestones = [
    { text: 'Task initiated', done: node.status !== 'Locked' && node.status !== 'Not Started' },
    { text: 'Development in progress', done: node.status === 'In Progress' || node.status === 'Done' || node.status === 'Shipped' },
    { text: 'Review & testing', done: node.status === 'Done' || node.status === 'Shipped' },
    { text: 'Completed & deployed', done: node.status === 'Done' || node.status === 'Shipped' },
    { text: 'Shipped to production', done: node.status === 'Shipped' },
  ];
  milestones.forEach(m => {
    items.push({
      text: m.text,
      status: m.done ? 'done' : (node.status === 'In Progress' && m.text === 'Development in progress') ? 'active' : 'pending',
      group: 'milestones'
    });
  });

  return items;
}

function getDetailedProgress(node) {
  const items = buildProgressChecklist(node);
  const doneCount = items.filter(i => i.status === 'done').length;
  const activeCount = items.filter(i => i.status === 'active').length;
  const total = items.length;
  const pct = total > 0 ? Math.round(((doneCount + activeCount * 0.5) / total) * 100) : 0;
  return { items, doneCount, activeCount, pendingCount: total - doneCount - activeCount, total, pct };
}

function openDetail(node) {
  if (!node) return; selectedNode=node;
  const panel=document.getElementById('detailPanel'), overlay=document.getElementById('detailOverlay'), content=document.getElementById('detailContent');
  const c=branchColors[node.branch]||'#888';
  const dp = getDetailedProgress(node);
  const pc = (node.status==='Done'||node.status==='Shipped')?'var(--green)':node.status==='In Progress'?'var(--cyan)':'var(--text-dim)';

  const uH = (node.unlocks||[]).length>0 ? node.unlocks.map(u=>{const un=nodeMap[u];return un?`<div class="detail-unlock-item" onclick="event.stopPropagation();openDetail(nodeMap['${u}'])">${un.name}</div>`:''}).join('') : '<span style="color:var(--text-dim);font-size:10px">End node</span>';
  const bH = node.blockers?`<div class="detail-section"><div class="detail-section-title">Blockers</div><div class="blocker-badge">${node.blockers}</div></div>`:'';

  // Build checklist HTML grouped
  const depItems = dp.items.filter(i => i.group === 'dependencies');
  const msItems = dp.items.filter(i => i.group === 'milestones');

  let checklistHtml = '';
  if (depItems.length > 0) {
    checklistHtml += `<div class="checklist-group-title">Dependencies (${depItems.filter(i=>i.status==='done').length}/${depItems.length})</div>`;
    checklistHtml += depItems.map(i => `
      <div class="checklist-item ${i.status==='done'?'done':''} ${i.clickId?'checklist-clickable':''}" ${i.clickId?`onclick="event.stopPropagation();openDetail(nodeMap['${i.clickId}'])"`:''}>
        <div class="checklist-icon ${i.status}">${i.status==='done'?'\u2713':i.status==='active'?'\u25B6':'\u25CB'}</div>
        <span class="checklist-text">${i.text}</span>
        <span class="checklist-status ${i.status}">${i.status==='done'?'Done':i.status==='active'?'Active':'Pending'}</span>
      </div>`).join('');
  }

  checklistHtml += `<div class="checklist-group-title">Milestones (${msItems.filter(i=>i.status==='done').length}/${msItems.length})</div>`;
  checklistHtml += msItems.map(i => `
    <div class="checklist-item ${i.status==='done'?'done':''}">
      <div class="checklist-icon ${i.status}">${i.status==='done'?'\u2713':i.status==='active'?'\u25B6':'\u25CB'}</div>
      <span class="checklist-text">${i.text}</span>
      <span class="checklist-status ${i.status}">${i.status==='done'?'Done':i.status==='active'?'In Progress':'Pending'}</span>
    </div>`).join('');

  content.innerHTML = `
    <div class="detail-branch" style="background:${c}15;color:${c};border:1px solid ${c}30">${node.branch}</div>
    <div class="detail-title">${node.name}</div>
    <div class="detail-phase">Phase ${node.phase} &middot; ${(node.team||[]).join(', ')||'Unassigned'} &middot; ${statusIcons[node.status]||''} ${node.status}</div>

    <div class="detail-progress-section">
      <div class="detail-progress-header">
        <span class="detail-progress-label">Overall Progress</span>
        <span class="detail-progress-value" style="color:${pc}">${dp.pct}%</span>
      </div>
      <div class="detail-pbar"><div class="detail-pfill" style="width:${dp.pct}%;background:${pc}"></div></div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <span style="font-size:9px;color:var(--green)">\u2713 ${dp.doneCount} done</span>
        <span style="font-size:9px;color:var(--cyan)">\u25B6 ${dp.activeCount} active</span>
        <span style="font-size:9px;color:var(--text-dim)">\u25CB ${dp.pendingCount} pending</span>
      </div>
    </div>

    <div class="detail-columns">
      <div class="detail-col-left">
        <div class="detail-section-title">Progress Details</div>
        <div class="progress-checklist">${checklistHtml}</div>
      </div>
      <div class="detail-col-right">
        <div class="detail-row"><span class="detail-row-label">Priority</span><span class="detail-row-value">${node.priority}</span></div>
        <div class="detail-row"><span class="detail-row-label">Est. Cost</span><span class="detail-row-value">${node.cost>0?'$'+node.cost.toLocaleString():'N/A'}</span></div>
        <div class="detail-row"><span class="detail-row-label">Duration</span><span class="detail-row-value">${node.duration||'\u2014'}</span></div>
        ${bH}
        <div class="detail-section" style="margin-top:12px"><div class="detail-section-title">Notes</div><div class="detail-section-content">${node.notes||'\u2014'}</div></div>
        <div class="detail-section"><div class="detail-section-title">Unlocks (${(node.unlocks||[]).length})</div>${uH}</div>
      </div>
    </div>`;
  panel.classList.add('open'); overlay.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
  selectedNode=null;
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeDetail(); if(e.key==='r'&&!e.target.matches('input')) fetchNodes(); });
fetchNodes();
setInterval(fetchNodes, AUTO_REFRESH_MS);
</script>
</body>
