<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLTR Protocol — Skill Tree</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0b10;--bg2:#10111a;--bg3:#161722;
  --border:#1e2030;--border2:#2a2c42;
  --text:#b8b8c8;--text-dim:#505068;--text-bright:#e0e0f0;
  --cyan:#00ccff;--cyan-g:rgba(0,204,255,.35);
  --green:#22dd66;--green-g:rgba(34,221,102,.3);
  --gold:#d4a832;--gold-g:rgba(212,168,50,.35);
  --red:#dd3344;--red-g:rgba(221,51,68,.3);
  --orange:#ee8822;--orange-g:rgba(238,136,34,.3);
  --purple:#9955ee;--purple-g:rgba(153,85,238,.3);
  --pink:#dd44aa;--pink-g:rgba(221,68,170,.3);
}

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;height:100vh}

/* ═══ BG TEXTURE ═══ */
.bg-tex{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 100%,rgba(212,168,50,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 20% 40%,rgba(0,204,255,.02) 0%,transparent 40%),
    radial-gradient(ellipse at 80% 40%,rgba(221,51,68,.02) 0%,transparent 40%),
    var(--bg);
}
.bg-tex::after{content:'';position:absolute;inset:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
}

/* ═══ LOADING ═══ */
.ld{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s}
.ld.hidden{opacity:0;pointer-events:none}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;font-weight:900;color:var(--gold);letter-spacing:8px;text-shadow:0 0 40px var(--gold-g),0 2px 8px rgba(0,0,0,.8)}
.ld-bar{width:180px;height:2px;background:#1a1a2a;border-radius:1px;overflow:hidden}
.ld-fill{height:100%;width:30%;background:var(--gold);border-radius:1px;animation:ldp 1s ease-in-out infinite}
@keyframes ldp{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.ld-txt{font-size:9px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}

/* ═══ TOP BAR ═══ */
.top{position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(10,11,16,.96),rgba(10,11,16,.88));
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.top-l{display:flex;align-items:center;gap:14px}
.logo{font-family:'Cinzel',serif;font-size:16px;font-weight:900;color:var(--gold);letter-spacing:4px;text-shadow:0 0 16px var(--gold-g)}
.logo-s{font-family:'Cinzel',serif;font-size:8px;color:var(--text-dim);letter-spacing:3px}
.sync{display:flex;align-items:center;gap:5px;font-size:8px;color:var(--text-dim);padding:3px 8px;border:1px solid var(--border);border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;background:rgba(10,11,16,.6)}
.sync:hover{border-color:var(--gold);color:var(--text)}
.sd{width:5px;height:5px;border-radius:50%;background:var(--green)}
.sd.syncing{background:var(--gold);animation:sp .6s linear infinite}
.sd.error{background:var(--red)}
@keyframes sp{to{transform:rotate(360deg)}}
.top-r{display:flex;gap:18px;align-items:center}
.st{text-align:center}
.st-v{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-bright)}
.st-l{font-size:7px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}
.pb{width:100px;height:4px;background:#111;border-radius:2px;overflow:hidden;border:1px solid #1a1a2a}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),#e8c84a);transition:width .6s;box-shadow:0 0 8px var(--gold-g)}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:calc(100vh - 42px);margin-top:42px;position:relative;z-index:1}

/* ═══ QUEST PANEL ═══ */
.qp{width:240px;min-width:240px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto}
.qp-h{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;text-shadow:0 0 10px var(--gold-g)}
.qp-s{font-size:9px;color:var(--text-dim);margin-bottom:12px}
.qc{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:9px 10px;margin-bottom:7px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.qc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:2px}
.qc.q0::before{background:var(--red)}.qc.q1::before{background:var(--gold)}.qc.q2::before{background:var(--cyan)}
.qc:hover{border-color:var(--border2);transform:translateX(2px)}
.qr{font-family:'Cinzel',serif;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.qc.q0 .qr{color:var(--red)}.qc.q1 .qr{color:var(--gold)}.qc.q2 .qr{color:var(--cyan)}
.qn{font-size:10px;font-weight:700;color:var(--text-bright);margin-bottom:3px;line-height:1.3}
.qre{font-size:8px;color:var(--text-dim);line-height:1.3;margin-bottom:5px}
.qbw{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.qb{flex:1;height:3px;background:#111;border-radius:2px;overflow:hidden}
.qbf{height:100%;border-radius:2px}
.qbl{font-family:'Cinzel',serif;font-size:7px;color:var(--text-dim);font-weight:600}
.qt{display:flex;gap:3px;flex-wrap:wrap}
.qtg{font-size:7px;padding:1px 4px;border-radius:2px;font-weight:600;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:var(--text-dim)}
.qdiv{height:1px;background:var(--border);margin:12px 0}

/* Legend */
.lg-t{font-family:'Cinzel',serif;font-size:8px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.lg-i{display:flex;align-items:center;gap:7px;font-size:8px;color:var(--text-dim);margin-bottom:4px}
.lg-d{width:10px;height:10px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center}

/* ═══ TREE ═══ */
.ta{flex:1;overflow:auto;position:relative}
.tv{position:relative;min-width:100%;min-height:100%}
.ts{position:absolute;top:0;left:0;pointer-events:none;z-index:1}

/* ═══ CONNECTION PATHS ═══ */
.cp{fill:none;stroke-linecap:round;transition:all .3s}
.cp.locked{stroke:#14151e;stroke-width:3;stroke-dasharray:6 4;opacity:.4}
.cp.ready{stroke:#222338;stroke-width:3;opacity:.5}
.cp.active{stroke-width:4;opacity:.85}
.cp.done{stroke-width:3.5;opacity:.6}
.cp.glow{filter:drop-shadow(0 0 6px var(--glow-color))}

/* ═══ NODE ═══ */
.nd{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:2;user-select:none;transition:transform .2s}
.nd:hover{transform:scale(1.1);z-index:10}
.nd:hover .nd-name{color:var(--text-bright)}

/* Medallion frame */
.md{width:64px;height:64px;position:relative;display:flex;align-items:center;justify-content:center}

/* Outer ring SVG */
.md svg.ring{position:absolute;inset:-4px;width:72px;height:72px}
.ring-outer{fill:none;stroke-width:2;transition:all .3s}
.ring-inner{fill:none;stroke-width:1.5;transition:all .3s}
.ring-bg{transition:all .3s}

/* Icon inside */
.md .ico{position:relative;z-index:2;width:30px;height:30px}
.md .ico svg{width:100%;height:100%}
.md .ico svg *{transition:all .3s}

/* Progress badge */
.nd-badge{
  position:absolute;bottom:-2px;right:-6px;z-index:4;
  font-family:'Cinzel',serif;font-size:7px;font-weight:700;
  padding:1px 4px;border-radius:2px;
  background:var(--bg);border:1px solid var(--border);
  color:var(--text-dim);letter-spacing:.5px;
  min-width:22px;text-align:center;
}

/* Node name */
.nd-name{font-size:7px;font-weight:600;color:var(--text-dim);text-align:center;margin-top:4px;max-width:90px;line-height:1.15;letter-spacing:.2px;transition:color .2s}

/* Branch label */
.branch-label{
  position:absolute;z-index:3;
  font-family:'Cinzel',serif;font-size:9px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  text-shadow:0 0 20px currentColor;
  opacity:.7;pointer-events:none;white-space:nowrap;
}

/* ═══ STATUS STYLES ═══ */
.nd[data-status="Locked"]{opacity:.3;filter:grayscale(.7)}
.nd[data-status="Locked"] .ring-outer{stroke:#1a1b24}
.nd[data-status="Locked"] .ring-inner{stroke:#141520}
.nd[data-status="Locked"] .ring-bg{fill:#0c0d14}
.nd[data-status="Locked"] .ico svg *{stroke:#222!important;fill:none!important}
.nd[data-status="Locked"] .nd-badge{opacity:.4}

.nd[data-status="Not Started"] .ring-outer{stroke:#2a2c42}
.nd[data-status="Not Started"] .ring-inner{stroke:#222338}
.nd[data-status="Not Started"] .ring-bg{fill:#111220}
.nd[data-status="Not Started"] .ico svg *{stroke:#444!important}

.nd[data-status="In Progress"] .ring-bg{fill-opacity:.12}
.nd[data-status="In Progress"] .md{animation:ndp 3s ease-in-out infinite}
@keyframes ndp{0%,100%{filter:drop-shadow(0 0 8px var(--node-glow))}50%{filter:drop-shadow(0 0 18px var(--node-glow))}}

.nd[data-status="Done"] .ring-bg{fill-opacity:.1}
.nd[data-status="Done"] .md{filter:drop-shadow(0 0 6px var(--node-glow))}

.nd[data-status="Shipped"] .ring-bg{fill-opacity:.12}
.nd[data-status="Shipped"] .md{filter:drop-shadow(0 0 10px var(--node-glow))}
.nd[data-status="Shipped"] .nd-badge{background:var(--gold);color:#000;border-color:var(--gold)}

/* Diamond milestone node */
.nd.diamond .md{transform:rotate(45deg);width:48px;height:48px}
.nd.diamond .md .ico{transform:rotate(-45deg)}
.nd.diamond .md svg.ring{width:56px;height:56px;inset:-4px}
.nd.diamond .nd-badge{bottom:-6px;right:-10px}

/* ═══ DETAIL MODAL ═══ */
.dov{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.dov.open{opacity:1;pointer-events:auto}
.dp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.92);
  width:580px;max-width:92vw;max-height:85vh;
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  z-index:200;overflow-y:auto;padding:24px 28px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 1px rgba(212,168,50,.1)}
.dp.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.dc{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.dc:hover{border-color:var(--gold);color:#fff}
.d-branch{display:inline-block;font-family:'Cinzel',serif;font-size:8px;font-weight:600;padding:2px 7px;border-radius:2px;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.d-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.3}
.d-phase{font-size:10px;color:var(--text-dim);margin-bottom:14px}
.d-cols{display:flex;gap:24px}
.d-col{flex:1;min-width:0}
.d-prog{margin-bottom:16px}
.d-prog-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.d-prog-l{font-family:'Cinzel',serif;font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:600}
.d-prog-v{font-family:'Cinzel',serif;font-size:11px;font-weight:700}
.d-pbar{width:100%;height:8px;background:#0e0f18;border-radius:4px;overflow:hidden;border:1px solid #1a1b28}
.d-pfill{height:100%;border-radius:4px;transition:width .5s}
.d-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(30,32,48,.4)}
.d-row-l{font-size:10px;color:var(--text-dim)}
.d-row-v{font-size:10px;color:#fff;font-weight:600}
.d-sec{margin-bottom:10px}
.d-sec-t{font-family:'Cinzel',serif;font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:4px;font-weight:600}
.d-sec-c{font-size:11px;color:var(--text);line-height:1.5}
.d-dep{font-size:10px;padding:3px 7px;background:rgba(153,85,238,.06);border:1px solid rgba(153,85,238,.12);border-radius:3px;color:#a78bfa;cursor:pointer;transition:all .2s;margin-bottom:3px}
.d-dep:hover{background:rgba(153,85,238,.12)}
.d-unl{font-size:10px;padding:3px 7px;background:rgba(34,221,102,.06);border:1px solid rgba(34,221,102,.12);border-radius:3px;color:var(--green);cursor:pointer;transition:all .2s;margin-bottom:3px}
.d-unl:hover{background:rgba(34,221,102,.12)}
.d-blk{font-size:10px;padding:5px 8px;background:rgba(221,51,68,.06);border:1px solid rgba(221,51,68,.12);border-radius:3px;color:var(--red);line-height:1.4}

/* Checklist */
.cl-gt{font-family:'Cinzel',serif;font-size:7px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin:8px 0 4px;font-weight:600}
.cl-gt:first-child{margin-top:0}
.cl-i{display:flex;align-items:center;gap:7px;padding:4px 7px;margin-bottom:2px;border-radius:3px;font-size:10px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.02);transition:background .2s}
.cl-i:hover{background:rgba(255,255,255,.03)}
.cl-i.done{opacity:.65}
.cl-i.done .cl-t{text-decoration:line-through;color:var(--text-dim)}
.cl-ic{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.cl-ic.done{background:rgba(34,221,102,.12);color:var(--green)}
.cl-ic.pending{background:rgba(255,255,255,.03);color:var(--text-dim);border:1px solid rgba(255,255,255,.06)}
.cl-ic.active{background:rgba(0,204,255,.12);color:var(--cyan)}
.cl-t{color:var(--text);flex:1}
.cl-s{font-size:7px;font-weight:600;padding:1px 4px;border-radius:2px;letter-spacing:.3px}
.cl-s.done{background:rgba(34,221,102,.08);color:var(--green)}
.cl-s.active{background:rgba(0,204,255,.08);color:var(--cyan)}
.cl-s.pending{background:rgba(255,255,255,.03);color:var(--text-dim)}
.cl-click{cursor:pointer}.cl-click:hover{background:rgba(153,85,238,.06);border-color:rgba(153,85,238,.12)}

@media(max-width:700px){.d-cols{flex-direction:column;gap:12px}.dp{padding:18px 14px}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2030;border-radius:2px}

@media(max-width:900px){.qp{display:none}.top-r{display:none}.dp{width:95vw;max-height:90vh}}
</style>
</head>
<body>
<div class="bg-tex"></div>

<div class="ld" id="ld">
  <div class="ld-logo">CLTR</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-txt">Channeling the skill tree...</div>
</div>

<div class="top">
  <div class="top-l">
    <div><div class="logo">CLTR</div><div class="logo-s">Skill Tree</div></div>
    <div class="sync" onclick="fetchNodes()"><div class="sd" id="sd"></div><span id="st">Live</span></div>
  </div>
  <div class="top-r">
    <div class="st"><div class="st-v" id="sN">&mdash;</div><div class="st-l">Nodes</div></div>
    <div class="st"><div class="st-v" id="sA">&mdash;</div><div class="st-l">Active</div></div>
    <div class="st"><div class="st-v" id="sD">&mdash;</div><div class="st-l">Done</div></div>
    <div style="text-align:center"><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><div class="st-l" style="margin-top:2px"><span id="sP">0</span>%</div></div>
  </div>
</div>

<div class="app">
  <div class="qp">
    <div class="qp-h">Daily Quests</div>
    <div class="qp-s">Suggested focus areas</div>
    <div id="ql"></div>
    <div class="qdiv"></div>
    <div class="lg-t">Status</div>
    <div class="lg-i"><div class="lg-d" style="border-color:#1a1b24;background:#0c0d14"></div>Locked</div>
    <div class="lg-i"><div class="lg-d" style="border-color:#2a2c42;background:#111220"></div>Not Started</div>
    <div class="lg-i"><div class="lg-d" style="border-color:var(--cyan);background:rgba(0,204,255,.1);box-shadow:0 0 6px var(--cyan-g)"></div>In Progress</div>
    <div class="lg-i"><div class="lg-d" style="border-color:var(--green);background:rgba(34,221,102,.1)"></div>Done</div>
    <div class="lg-i"><div class="lg-d" style="border-color:var(--gold);background:rgba(212,168,50,.1);box-shadow:0 0 6px var(--gold-g)"></div>Shipped</div>
    <div class="qdiv"></div>
    <div class="lg-t">Branches</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--pink)"></div>Design & Brand</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--cyan)"></div>Core Product</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div>Operations</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--orange)"></div>GTM & Marketing</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div>Token & DeFi</div>
    <div class="lg-i"><div style="width:8px;height:8px;border-radius:50%;background:var(--purple)"></div>Multi-Category</div>
  </div>

  <div class="ta" id="ta">
    <div class="tv" id="tv"><svg class="ts" id="tsvg"></svg></div>
  </div>
</div>

<div class="dov" id="dov" onclick="closeDetail()"></div>
<div class="dp" id="dp"><button class="dc" onclick="closeDetail()">&#10005;</button><div id="dpc"></div></div>

<script>
const API='/api/nodes',REFRESH=30000;
let nodes=[],NM={},sel=null;

const BC={"Design & Brand":"#dd44aa","Core Product":"#00ccff","Operations":"#22dd66","GTM & Marketing":"#ee8822","Token & DeFi":"#dd3344","Multi-Category":"#9955ee"};
const BG={"Design & Brand":"rgba(221,68,170,.3)","Core Product":"rgba(0,204,255,.3)","Operations":"rgba(34,221,102,.3)","GTM & Marketing":"rgba(238,136,34,.3)","Token & DeFi":"rgba(221,51,68,.3)","Multi-Category":"rgba(153,85,238,.3)"};
const SI={'Done':'\u2713','In Progress':'\u25B6','Shipped':'\u2605','Locked':'\uD83D\uDD12','Not Started':'\u25CB'};

// ═══ SVG ICONS ═══
const IC={
"brand-identity":`<svg viewBox="0 0 30 30" fill="none" stroke="#666" stroke-width="1.3"><polygon points="15,2 28,8 28,20 15,28 2,20 2,8"/><circle cx="15" cy="15" r="5"/><line x1="15" y1="2" x2="15" y2="10"/><line x1="15" y1="20" x2="15" y2="28"/></svg>`,

const DI=`<svg viewBox="0 0 30 30" fill="none" stroke="#666" stroke-width="1.3"><polygon points="15,3 28,9 28,21 15,27 2,21 2,9"/><circle cx="15" cy="15" r="4"/></svg>`;
function gi(id){return IC[id]||DI}

function gp(n){const m={'Shipped':5,'Done':5,'In Progress':3,'Not Started':0,'Locked':0};return{c:m[n.status]||0,m:5}}
function gpp(n){const p=gp(n);return(p.c/p.m)*100}

// ═══ LAYOUT ENGINE ═══
// Branch column positions (0-1 range, mapped to tree width)
const BX={
  "Design & Brand":.12,
  "GTM & Marketing":.28,
  "Core Product":.48,
  "Operations":.68,
  "Token & DeFi":.82,
  "Multi-Category":.92
};

function computeLayout(nodes){
  const map={};nodes.forEach(n=>map[n.id]=n);
  // Compute depth
  const dep={};
  function gd(id,v=new Set()){
    if(dep[id]!==undefined)return dep[id];if(v.has(id))return 0;v.add(id);
    const n=map[id];if(!n||!n.depends||!n.depends.length){dep[id]=0;return 0}
    let mx=0;n.depends.forEach(d=>{if(map[d])mx=Math.max(mx,gd(d,new Set(v))+1)});
    dep[id]=mx;return mx;
  }
  nodes.forEach(n=>gd(n.id));

  const maxD=Math.max(...Object.values(dep),0);

  // Group by depth+branch for sub-positioning
  const layerBranch={};
  nodes.forEach(n=>{
    const d=dep[n.id]||0;const k=d+'|'+n.branch;
    if(!layerBranch[k])layerBranch[k]=[];
    layerBranch[k].push(n);
  });

  const pos={};
  const W=Math.max(nodes.length*28,1400);
  const layerH=130;
  const H=(maxD+1)*layerH+120;

  nodes.forEach(n=>{
    const d=dep[n.id]||0;
    const k=d+'|'+n.branch;
    const group=layerBranch[k];
    const idx=group.indexOf(n);
    const baseX=BX[n.branch]||.5;
    // Spread siblings within branch column
    const spread=group.length>1?(idx-(group.length-1)/2)*70:0;
    // Y: inverted (root at bottom)
    pos[n.id]={
      x:60+baseX*(W-120)+spread,
      y:H-60-d*layerH
    };
  });

  return{pos,W,H,maxD};
}

// ═══ RENDER ═══
function renderTree(){
  if(!nodes.length)return;
  const{pos,W,H,maxD}=computeLayout(nodes);
  const vp=document.getElementById('tv'),svg=document.getElementById('tsvg');
  vp.style.width=W+'px';vp.style.height=H+'px';
  svg.setAttribute('width',W);svg.setAttribute('height',H);

  // Build connection paths
  let sh=`<defs>`;
  // Glow filters per branch
  Object.entries(BC).forEach(([b,c])=>{
    const id='g_'+b.replace(/[^a-z]/gi,'');
    sh+=`<filter id="${id}" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/></filter>`;
  });
  sh+=`</defs>`;

  // Draw connections — thick glowing colored paths
  nodes.forEach(n=>{
    if(!n.depends||!pos[n.id])return;
    n.depends.forEach(did=>{
      if(!pos[did])return;
      const f=pos[did],t=pos[n.id];
      const dn=NM[did];
      const dd=dn&&(dn.status==='Done'||dn.status==='Shipped');
      const act=n.status==='In Progress';
      const col=BC[n.branch]||'#444';
      const fId='g_'+n.branch.replace(/[^a-z]/gi,'');

      let cls='locked',sw=3,stroke='#14151e',opacity=.4,filt='';
      if(dd&&act){cls='active';sw=4.5;stroke=col;opacity=.85;filt=`filter="url(#${fId})"`;
      }else if(dd){cls='done';sw=3.5;stroke=col;opacity=.45;
      }else if(n.status!=='Locked'){cls='ready';sw=3;stroke='#222338';opacity=.5}

      const dx=t.x-f.x,dy=t.y-f.y;
      const cp1x=f.x,cp1y=f.y+dy*.4;
      const cp2x=t.x,cp2y=t.y-dy*.4;
      const d=`M${f.x},${f.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${t.x},${t.y}`;

      // Glow layer (behind)
      if(cls==='active'||cls==='done'){
        sh+=`<path d="${d}" fill="none" stroke="${stroke}" stroke-width="${sw+3}" opacity="${opacity*.3}" stroke-linecap="round" ${filt}/>`;
      }
      // Main line
      sh+=`<path d="${d}" fill="none" stroke="${stroke}" stroke-width="${sw}" opacity="${opacity}" stroke-linecap="round" ${cls==='locked'?'stroke-dasharray="5 4"':''}/>`;
    });
  });
  svg.innerHTML=sh;

  // Remove old nodes
  vp.querySelectorAll('.nd,.branch-label').forEach(e=>e.remove());

  // Branch labels
  const placed={};
  nodes.forEach(n=>{
    if(!pos[n.id])return;
    const bk=n.branch;
    if(!placed[bk]&&n.depends&&n.depends.length===0){
      placed[bk]=true;
      const p=pos[n.id];
      const c=BC[bk]||'#888';
      vp.insertAdjacentHTML('beforeend',
        `<div class="branch-label" style="left:${p.x}px;top:${p.y+60}px;color:${c};transform:translateX(-50%)">${bk.toUpperCase()}</div>`
      );
    }
  });

  // Nodes
  let nh='';
  nodes.forEach(n=>{
    if(!pos[n.id])return;
    const p=pos[n.id],c=BC[n.branch]||'#888',g=BG[n.branch]||'rgba(100,100,100,.3)';
    const pr=gp(n),pct=gpp(n);
    const isDiamond=n.priority==='Critical Path'&&(n.status==='In Progress'||n.status==='Done'||n.status==='Shipped');
    const isActive=n.status==='In Progress';
    const isDone=n.status==='Done'||n.status==='Shipped';
    const ringCol=isDone?c:isActive?c:n.status==='Not Started'?'#2a2c42':'#1a1b24';
    const fillCol=isDone?c:isActive?c:'transparent';
    const badgeText=pr.c>=pr.m?'MAX':`${pr.c}/${pr.m}`;
    const badgeStyle=pr.c>=pr.m?`background:${c};color:#000;border-color:${c}`:'';

    nh+=`<div class="nd ${isDiamond?'diamond':''}" data-status="${n.status}" data-id="${n.id}" style="left:${p.x-48}px;top:${p.y-48}px;width:96px;--node-glow:${g}" onclick="openDetail(NM['${n.id}'])">
      <div class="md">
        <svg class="ring" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="28" fill="${fillCol}" fill-opacity="0"/>
          <circle class="ring-outer" cx="36" cy="36" r="30" stroke="${ringCol}" stroke-width="${isActive||isDone?2.5:2}"/>
          <circle class="ring-inner" cx="36" cy="36" r="26" stroke="${isActive||isDone?ringCol:'transparent'}" stroke-width="1" opacity=".5"/>
          <circle cx="36" cy="36" r="23" fill="none" stroke="${isActive||isDone?ringCol:'transparent'}" stroke-width=".5" opacity=".3" stroke-dasharray="2 3"/>
        </svg>
        <div class="ico">${gi(n.id)}</div>
        <div class="nd-badge" style="${badgeStyle}">${badgeText}</div>
      </div>
      <div class="nd-name">${n.name}</div>
    </div>`;
  });
  vp.insertAdjacentHTML('beforeend',nh);

  // Scroll to bottom (roots)
  const ta=document.getElementById('ta');
  ta.scrollTop=ta.scrollHeight;
}

// ═══ QUESTS ═══
function renderQuests(){
  const list=document.getElementById('ql');
  const d=new Date(),seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  const ps={'Critical Path':100,'High':75,'Medium':50,'Low':25};
  const cands=nodes.filter(n=>{
    if(n.status==='In Progress')return true;
    if(n.status==='Not Started')return!n.depends||!n.depends.length||n.depends.every(d=>{const x=NM[d];return x&&(x.status==='Done'||x.status==='Shipped')});
    return false;
  });
  const scored=cands.map((n,i)=>{let s=ps[n.priority]||50;if(n.status==='In Progress')s+=50;s+=(n.unlocks?.length||0)*12;s+=((seed*(i+1)*7)%15);return{n,s}}).sort((a,b)=>b.s-a.s).slice(0,3);

  if(!scored.length){list.innerHTML='<div style="color:var(--text-dim);font-size:9px;padding:6px 0">No actionable quests.</div>';return}
  const lb=['Primary Focus','Secondary','Bonus Quest'];
  list.innerHTML=scored.map((it,i)=>{
    const n=it.n,pr=gp(n),c=BC[n.branch]||'#888';
    return`<div class="qc q${i}" onclick="openDetail(NM['${n.id}'])">
      <div class="qr">${lb[i]}</div><div class="qn">${n.name}</div>
      <div class="qre">${n.status==='In Progress'?'In progress — keep pushing':'Ready — deps cleared'}</div>
      <div class="qbw"><div class="qb"><div class="qbf" style="width:${gpp(n)}%;background:${c}"></div></div><span class="qbl">${pr.c}/${pr.m}</span></div>
      <div class="qt"><span class="qtg" style="color:${c}">${n.branch}</span><span class="qtg">${n.priority}</span>${n.unlocks?.length?`<span class="qtg" style="color:var(--green)">Unlocks ${n.unlocks.length}</span>`:''}</div>
    </div>`}).join('');
}

function updateStats(s){if(!s)return;document.getElementById('sN').textContent=s.total;document.getElementById('sA').textContent=s.active;document.getElementById('sD').textContent=s.done;document.getElementById('sP').textContent=s.progress;document.getElementById('pf').style.width=Math.max(s.progress,2)+'%'}

async function fetchNodes(){
  const dot=document.getElementById('sd'),txt=document.getElementById('st');
  dot.classList.add('syncing');txt.textContent='Syncing...';
  try{
    const r=await fetch(API),d=await r.json();if(!d.ok)throw new Error(d.error);
    nodes=d.nodes;NM={};nodes.forEach(n=>NM[n.id]=n);
    renderTree();renderQuests();updateStats(d.stats);
    dot.classList.remove('syncing','error');txt.textContent=`Synced ${new Date(d.lastSync).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('ld').classList.add('hidden');
    if(sel){const u=NM[sel.id];if(u)openDetail(u)}
  }catch(e){console.error(e);dot.classList.remove('syncing');dot.classList.add('error');txt.textContent='Error';document.getElementById('ld').classList.add('hidden')}
}

// ═══ DETAIL MODAL ═══
function buildChecklist(node){
  const items=[];
  if(node.depends&&node.depends.length){
    node.depends.forEach(did=>{
      const dep=NM[did];if(!dep)return;
      const dd=dep.status==='Done'||dep.status==='Shipped';
      items.push({text:dep.name,st:dd?'done':dep.status==='In Progress'?'active':'pending',grp:'dep',cid:did});
    });
  }
  [{t:'Task initiated',d:node.status!=='Locked'&&node.status!=='Not Started'},
   {t:'Development in progress',d:node.status==='In Progress'||node.status==='Done'||node.status==='Shipped'},
   {t:'Review & testing',d:node.status==='Done'||node.status==='Shipped'},
   {t:'Completed & deployed',d:node.status==='Done'||node.status==='Shipped'},
   {t:'Shipped to production',d:node.status==='Shipped'}
  ].forEach(m=>items.push({text:m.t,st:m.d?'done':(node.status==='In Progress'&&m.t==='Development in progress')?'active':'pending',grp:'ms'}));
  return items;
}

function openDetail(node){
  if(!node)return;sel=node;
  const panel=document.getElementById('dp'),overlay=document.getElementById('dov'),content=document.getElementById('dpc');
  const c=BC[node.branch]||'#888';
  const items=buildChecklist(node);
  const dc=items.filter(i=>i.st==='done').length,ac=items.filter(i=>i.st==='active').length,pc=items.length-dc-ac;
  const pct=items.length?Math.round(((dc+ac*.5)/items.length)*100):0;
  const pcol=(node.status==='Done'||node.status==='Shipped')?'var(--green)':node.status==='In Progress'?c:'var(--text-dim)';

  const depI=items.filter(i=>i.grp==='dep'),msI=items.filter(i=>i.grp==='ms');
  const uH=(node.unlocks||[]).length>0?node.unlocks.map(u=>{const un=NM[u];return un?`<div class="d-unl" onclick="event.stopPropagation();openDetail(NM['${u}'])">${un.name}</div>`:''}).join(''):'<span style="color:var(--text-dim);font-size:9px">End node</span>';
  const bH=node.blockers?`<div class="d-sec"><div class="d-sec-t">Blockers</div><div class="d-blk">${node.blockers}</div></div>`:'';

  let clH='';
  if(depI.length){
    clH+=`<div class="cl-gt">Dependencies (${depI.filter(i=>i.st==='done').length}/${depI.length})</div>`;
    clH+=depI.map(i=>`<div class="cl-i ${i.st==='done'?'done':''} ${i.cid?'cl-click':''}" ${i.cid?`onclick="event.stopPropagation();openDetail(NM['${i.cid}'])"`:''}>
      <div class="cl-ic ${i.st}">${i.st==='done'?'\u2713':i.st==='active'?'\u25B6':'\u25CB'}</div>
      <span class="cl-t">${i.text}</span>
      <span class="cl-s ${i.st}">${i.st==='done'?'Done':i.st==='active'?'Active':'Pending'}</span></div>`).join('');
  }
  clH+=`<div class="cl-gt">Milestones (${msI.filter(i=>i.st==='done').length}/${msI.length})</div>`;
  clH+=msI.map(i=>`<div class="cl-i ${i.st==='done'?'done':''}">
    <div class="cl-ic ${i.st}">${i.st==='done'?'\u2713':i.st==='active'?'\u25B6':'\u25CB'}</div>
    <span class="cl-t">${i.text}</span>
    <span class="cl-s ${i.st}">${i.st==='done'?'Done':i.st==='active'?'In Progress':'Pending'}</span></div>`).join('');

  content.innerHTML=`
    <div class="d-branch" style="background:${c}15;color:${c};border:1px solid ${c}30">${node.branch}</div>
    <div class="d-title">${node.name}</div>
    <div class="d-phase">Phase ${node.phase} &middot; ${(node.team||[]).join(', ')||'Unassigned'} &middot; ${SI[node.status]||''} ${node.status}</div>
    <div class="d-prog"><div class="d-prog-h"><span class="d-prog-l">Overall Progress</span><span class="d-prog-v" style="color:${pcol}">${pct}%</span></div>
    <div class="d-pbar"><div class="d-pfill" style="width:${pct}%;background:${pcol}"></div></div>
    <div style="display:flex;gap:10px;margin-top:6px"><span style="font-size:8px;color:var(--green)">\u2713 ${dc} done</span><span style="font-size:8px;color:${c}">\u25B6 ${ac} active</span><span style="font-size:8px;color:var(--text-dim)">\u25CB ${pc} pending</span></div></div>
    <div class="d-cols"><div class="d-col"><div class="d-sec-t">Progress Details</div>${clH}</div>
    <div class="d-col">
      <div class="d-row"><span class="d-row-l">Priority</span><span class="d-row-v">${node.priority}</span></div>
      <div class="d-row"><span class="d-row-l">Est. Cost</span><span class="d-row-v">${node.cost>0?'$'+node.cost.toLocaleString():'N/A'}</span></div>
      <div class="d-row"><span class="d-row-l">Duration</span><span class="d-row-v">${node.duration||'\u2014'}</span></div>
      ${bH}
      <div class="d-sec" style="margin-top:10px"><div class="d-sec-t">Notes</div><div class="d-sec-c">${node.notes||'\u2014'}</div></div>
      <div class="d-sec"><div class="d-sec-t">Unlocks (${(node.unlocks||[]).length})</div>${uH}</div>
    </div></div>`;
  panel.classList.add('open');overlay.classList.add('open');
}

function closeDetail(){document.getElementById('dp').classList.remove('open');document.getElementById('dov').classList.remove('open');sel=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();if(e.key==='r'&&!e.target.matches('input'))fetchNodes()});
fetchNodes();setInterval(fetchNodes,REFRESH);
</script>
</body>
</html>
