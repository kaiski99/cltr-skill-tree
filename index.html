<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLTR Protocol — Skill Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e0;
    --text-dim: #666680;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.4);
    --locked: #2a2a3a;
    --locked-text: #444466;
    --not-started: #3a3a5a;
    --in-progress: #7c5cfc;
    --done: #22c55e;
    --shipped: #f59e0b;
    --critical: #ef4444;
    --high: #f97316;
    --medium: #eab308;
    --low: #6b7280;
    --branch-design: #ec4899;
    --branch-product: #3b82f6;
    --branch-ops: #22c55e;
    --branch-gtm: #f97316;
    --branch-token: #ef4444;
    --branch-multi: #a855f7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 24px;
    background: linear-gradient(135deg, #7c5cfc, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .loading-bar {
    width: 200px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, var(--accent), #ec4899);
    border-radius: 2px;
    animation: load-pulse 1.2s ease-in-out infinite;
  }
  @keyframes load-pulse {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }
  .loading-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Sync indicator */
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sync-badge:hover { border-color: var(--accent); color: var(--text); }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--done);
    animation: sync-blink 2s ease-in-out infinite;
  }
  .sync-dot.syncing { background: var(--accent); animation: sync-spin 0.6s linear infinite; }
  .sync-dot.error { background: var(--critical); animation: none; }
  @keyframes sync-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, rgba(10,10,15,0.85) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    background: linear-gradient(135deg, #7c5cfc, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .phase-tabs {
    display: flex;
    gap: 4px;
  }

  .phase-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .phase-tab:hover { background: rgba(124,92,252,0.1); color: var(--text); }
  .phase-tab.active { background: rgba(124,92,252,0.15); border-color: var(--accent); color: #fff; }
  .phase-tab[data-phase="1"].active { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
  .phase-tab[data-phase="2"].active { border-color: #a855f7; background: rgba(168,85,247,0.15); }
  .phase-tab[data-phase="3"].active { border-color: #f97316; background: rgba(249,115,22,0.15); }
  .phase-tab[data-phase="4"].active { border-color: #ef4444; background: rgba(239,68,68,0.15); }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat { text-align: center; }

  .stat-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: #fff;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .progress-ring {
    width: 120px; height: 8px;
    background: var(--locked);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), #ec4899);
    transition: width 0.6s ease;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* Canvas */
  .canvas-container {
    width: 100vw; height: 100vh;
    padding-top: 60px;
    overflow: hidden;
    cursor: grab;
    position: relative;
  }
  .canvas-container:active { cursor: grabbing; }

  .canvas {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  .connections-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }

  .connection-line {
    fill: none;
    stroke-width: 2;
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .connection-line.active { opacity: 0.7; filter: drop-shadow(0 0 4px var(--accent-glow)); }

  /* Nodes */
  .node {
    position: absolute;
    width: 180px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }
  .node:hover { transform: scale(1.05); z-index: 50; }

  .node-inner {
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg2);
    position: relative;
    overflow: hidden;
  }
  .node-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .node[data-branch="Design & Brand"] .node-inner::before { background: var(--branch-design); }
  .node[data-branch="Core Product"] .node-inner::before { background: var(--branch-product); }
  .node[data-branch="Operations"] .node-inner::before { background: var(--branch-ops); }
  .node[data-branch="GTM & Marketing"] .node-inner::before { background: var(--branch-gtm); }
  .node[data-branch="Token & DeFi"] .node-inner::before { background: var(--branch-token); }
  .node[data-branch="Multi-Category"] .node-inner::before { background: var(--branch-multi); }

  .node[data-status="Locked"] .node-inner { border-color: #1a1a2a; background: rgba(18,18,26,0.6); opacity: 0.5; }
  .node[data-status="Locked"] .node-title { color: var(--locked-text); }
  .node[data-status="Locked"] .node-inner::before { opacity: 0.3; }
  .node[data-status="Locked"]::after { content: '\uD83D\uDD12'; position: absolute; top: -8px; right: -4px; font-size: 14px; filter: grayscale(0.5); }
  .node[data-status="Not Started"] .node-inner { border-color: #2a2a4a; }
  .node[data-status="In Progress"] .node-inner { border-color: var(--in-progress); box-shadow: 0 0 20px rgba(124,92,252,0.2), inset 0 0 20px rgba(124,92,252,0.05); animation: pulse-glow 2s ease-in-out infinite; }
  .node[data-status="Done"] .node-inner { border-color: var(--done); box-shadow: 0 0 15px rgba(34,197,94,0.2); }
  .node[data-status="Done"]::after { content: '\u2705'; position: absolute; top: -8px; right: -4px; font-size: 14px; }
  .node[data-status="Shipped"] .node-inner { border-color: var(--shipped); box-shadow: 0 0 15px rgba(245,158,11,0.2); }
  .node[data-status="Shipped"]::after { content: '\uD83D\uDE80'; position: absolute; top: -8px; right: -4px; font-size: 14px; }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(124,92,252,0.2), inset 0 0 20px rgba(124,92,252,0.05); }
    50% { box-shadow: 0 0 30px rgba(124,92,252,0.35), inset 0 0 30px rgba(124,92,252,0.1); }
  }

  .node-id { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }
  .node-title { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1.3; }
  .node-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px; }
  .tag-status { background: rgba(124,92,252,0.15); color: var(--accent); }
  .node[data-status="Locked"] .tag-status { background: rgba(42,42,58,0.5); color: var(--locked-text); }
  .node[data-status="In Progress"] .tag-status { background: rgba(124,92,252,0.2); color: #a78bfa; }
  .node[data-status="Done"] .tag-status { background: rgba(34,197,94,0.15); color: var(--done); }
  .node[data-status="Not Started"] .tag-status { background: rgba(100,100,140,0.15); color: #8888aa; }
  .tag-cost { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .tag-duration { background: rgba(59,130,246,0.12); color: #60a5fa; }
  .tag-priority { font-size: 8px; padding: 2px 5px; }
  .tag-priority.critical { background: rgba(239,68,68,0.15); color: #f87171; }
  .tag-priority.high { background: rgba(249,115,22,0.15); color: #fb923c; }
  .tag-priority.medium { background: rgba(234,179,8,0.15); color: #facc15; }
  .tag-priority.low { background: rgba(107,114,128,0.15); color: #9ca3af; }

  /* Detail Panel */
  .detail-panel {
    position: fixed;
    right: -420px; top: 60px; bottom: 0;
    width: 400px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 200;
    transition: right 0.3s ease;
    overflow-y: auto;
    padding: 24px;
  }
  .detail-panel.open { right: 0; }

  .detail-close {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .detail-close:hover { border-color: var(--accent); color: #fff; }

  .detail-branch-badge {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 4px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .detail-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .detail-phase { font-size: 11px; color: var(--text-dim); margin-bottom: 20px; }
  .detail-section { margin-bottom: 16px; }
  .detail-section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
  .detail-section-content { font-size: 13px; color: var(--text); line-height: 1.5; }
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(30,30,46,0.5); }
  .detail-row-label { font-size: 12px; color: var(--text-dim); }
  .detail-row-value { font-size: 12px; color: #fff; font-weight: 600; }
  .detail-deps { display: flex; flex-direction: column; gap: 4px; }
  .detail-dep-item {
    font-size: 11px; padding: 4px 8px;
    background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.15);
    border-radius: 6px; color: #a78bfa; cursor: pointer; transition: all 0.2s;
  }
  .detail-dep-item:hover { background: rgba(124,92,252,0.15); }
  .detail-unlocks-item {
    font-size: 11px; padding: 4px 8px;
    background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.15);
    border-radius: 6px; color: #4ade80; cursor: pointer; transition: all 0.2s;
  }
  .detail-unlocks-item:hover { background: rgba(34,197,94,0.15); }

  .blocker-badge {
    font-size: 11px; padding: 6px 10px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 6px; color: #f87171; line-height: 1.4;
  }

  /* Legend */
  .legend {
    position: fixed; bottom: 16px; left: 16px; z-index: 100;
    display: flex; gap: 12px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .zoom-controls {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    display: flex; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s;
  }
  .zoom-btn:hover { border-color: var(--accent); color: #fff; }

  .phase-column-header {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    width: 200px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    opacity: 0.6;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .stats-bar { display: none; }
    .legend { flex-wrap: wrap; }
    .detail-panel { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">CLTR</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-text">Syncing from Notion...</div>
</div>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">CLTR</div>
      <div class="logo-sub">Protocol Skill Tree</div>
    </div>
    <div class="phase-tabs">
      <button class="phase-tab active" data-phase="all" onclick="filterPhase('all')">All</button>
      <button class="phase-tab" data-phase="1" onclick="filterPhase('1')">Foundation</button>
      <button class="phase-tab" data-phase="2" onclick="filterPhase('2')">Growth</button>
      <button class="phase-tab" data-phase="3" onclick="filterPhase('3')">Scale</button>
      <button class="phase-tab" data-phase="4" onclick="filterPhase('4')">Ecosystem</button>
    </div>
    <div class="sync-badge" id="syncBadge" onclick="fetchNodes()" title="Click to sync from Notion">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Live</span>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-nodes">—</div>
      <div class="stat-label">Nodes</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-active">—</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-budget">—</div>
      <div class="stat-label">Est. Budget</div>
    </div>
    <div>
      <div class="progress-ring">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="stat-label" style="text-align:center; margin-top:3px">
        <span id="stat-progress">0</span>% Complete
      </div>
    </div>
  </div>
</div>

<div class="canvas-container" id="canvasContainer">
  <div class="canvas" id="canvas">
    <svg class="connections-svg" id="connectionsSvg"></svg>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&#10005;</button>
  <div id="detailContent"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--locked);border:1px solid #333"></div> Locked</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--not-started)"></div> Not Started</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--in-progress);box-shadow:0 0 6px var(--accent-glow)"></div> In Progress</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--done)"></div> Done</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--shipped)"></div> Shipped</div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" onclick="zoomIn()">+</button>
  <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
  <button class="zoom-btn" onclick="resetView()">&squf;</button>
</div>

<script>
// ===== CONFIG =====
const API_URL = '/api/nodes'; // Vercel serverless function
const AUTO_REFRESH_MS = 30000; // Auto-refresh every 30 seconds

// ===== STATE =====
let nodes = [];
let currentPhase = 'all';
let selectedNode = null;

const branchOrder = ["Design & Brand", "Core Product", "Operations", "GTM & Marketing", "Token & DeFi", "Multi-Category"];
const branchColors = {
  "Design & Brand": "#ec4899",
  "Core Product": "#3b82f6",
  "Operations": "#22c55e",
  "GTM & Marketing": "#f97316",
  "Token & DeFi": "#ef4444",
  "Multi-Category": "#a855f7"
};

const PHASE_GAP = 380;
const BRANCH_GAP = 220;
const NODE_W = 180;
const NODE_H = 110;
const PADDING_X = 80;
const PADDING_Y = 100;

// ===== FETCH FROM NOTION API =====
async function fetchNodes() {
  const syncDot = document.getElementById('syncDot');
  const syncText = document.getElementById('syncText');
  syncDot.classList.add('syncing');
  syncText.textContent = 'Syncing...';

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.ok) throw new Error(data.error);

    nodes = data.nodes;
    layoutNodes();
    renderConnections();
    renderNodes();
    updateStats(data.stats);

    syncDot.classList.remove('syncing');
    syncDot.classList.remove('error');
    const time = new Date(data.lastSync).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    syncText.textContent = `Synced ${time}`;

    // Hide loading
    document.getElementById('loadingOverlay').classList.add('hidden');

    // Update detail panel if open
    if (selectedNode) {
      const updated = nodes.find(n => n.id === selectedNode.id);
      if (updated) openDetail(updated);
    }

  } catch (err) {
    console.error('Sync failed:', err);
    syncDot.classList.remove('syncing');
    syncDot.classList.add('error');
    syncText.textContent = 'Sync failed';
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

// ===== LAYOUT =====
function layoutNodes() {
  const groups = {};
  nodes.forEach(n => {
    const key = `${n.phase}-${n.branch}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });

  nodes.forEach(n => {
    const phaseX = PADDING_X + (n.phase - 1) * PHASE_GAP;
    const branchIdx = branchOrder.indexOf(n.branch);
    const key = `${n.phase}-${n.branch}`;
    const group = groups[key] || [n];
    const idxInGroup = group.indexOf(n);

    const baseY = PADDING_Y + branchIdx * BRANCH_GAP;
    const offsetY = idxInGroup * (NODE_H + 16);

    n.x = phaseX + (idxInGroup % 2) * 30;
    n.y = baseY + offsetY;
  });
}

// ===== RENDER =====
const canvas = document.getElementById('canvas');
const svg = document.getElementById('connectionsSvg');

function getNodeById(id) { return nodes.find(n => n.id === id); }

function renderConnections() {
  svg.innerHTML = '';
  const maxX = Math.max(...nodes.map(n => n.x), 800) + 400;
  const maxY = Math.max(...nodes.map(n => n.y), 600) + 400;
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);

  nodes.forEach(node => {
    (node.depends || []).forEach(depId => {
      const dep = getNodeById(depId);
      if (!dep) return;
      if (currentPhase !== 'all' && node.phase !== parseInt(currentPhase) && dep.phase !== parseInt(currentPhase)) return;

      const x1 = dep.x + NODE_W / 2;
      const y1 = dep.y + NODE_H / 2;
      const x2 = node.x + NODE_W / 2;
      const y2 = node.y + NODE_H / 2;
      const midX = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);

      let strokeColor = '#2a2a3a';
      let opacity = '0.3';
      if (dep.status === 'Done' || dep.status === 'Shipped') {
        strokeColor = '#22c55e';
        opacity = '0.6';
      } else if (dep.status === 'In Progress' || node.status === 'In Progress') {
        strokeColor = '#7c5cfc';
        opacity = '0.7';
      }

      path.setAttribute('stroke', strokeColor);
      path.setAttribute('opacity', opacity);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-width', '2');
      svg.appendChild(path);
    });
  });
}

function renderNodes() {
  document.querySelectorAll('.node, .phase-column-header').forEach(el => el.remove());

  for (let p = 1; p <= 4; p++) {
    if (currentPhase !== 'all' && p !== parseInt(currentPhase)) continue;
    const header = document.createElement('div');
    header.className = 'phase-column-header';
    header.style.left = (PADDING_X + (p - 1) * PHASE_GAP) + 'px';
    header.style.top = '30px';
    const names = ['', 'Phase 1: Foundation', 'Phase 2: Growth', 'Phase 3: Scale', 'Phase 4: Ecosystem'];
    header.textContent = names[p];
    canvas.appendChild(header);
  }

  nodes.forEach((node, idx) => {
    if (currentPhase !== 'all' && node.phase !== parseInt(currentPhase)) return;

    const el = document.createElement('div');
    el.className = 'node';
    el.dataset.branch = node.branch;
    el.dataset.status = node.status;
    el.dataset.id = node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.style.width = NODE_W + 'px';

    const priorityClass = node.priority === 'Critical Path' ? 'critical' : node.priority.toLowerCase();
    const skId = node.nodeId ? `SK-${String(node.nodeId).padStart(3, '0')}` : `SK-${String(idx + 1).padStart(3, '0')}`;

    el.innerHTML = `
      <div class="node-inner">
        <div class="node-id">${skId}</div>
        <div class="node-title">${node.name}</div>
        <div class="node-meta">
          <span class="tag tag-status">${node.status}</span>
          <span class="tag tag-priority ${priorityClass}">${node.priority}</span>
          ${node.cost > 0 ? `<span class="tag tag-cost">$${(node.cost/1000).toFixed(0)}K</span>` : ''}
          ${node.duration ? `<span class="tag tag-duration">${node.duration}</span>` : ''}
        </div>
      </div>
    `;

    el.addEventListener('click', () => openDetail(node));
    canvas.appendChild(el);
  });
}

function updateStats(stats) {
  if (!stats) return;
  document.getElementById('stat-nodes').textContent = stats.total;
  document.getElementById('stat-active').textContent = stats.active;
  document.getElementById('stat-budget').textContent = '$' + Math.round(stats.totalCost / 1000) + 'K';
  document.getElementById('stat-progress').textContent = stats.progress;
  document.getElementById('progress-fill').style.width = Math.max(stats.progress, 3) + '%';
}

// ===== DETAIL PANEL =====
function openDetail(node) {
  selectedNode = node;
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const color = branchColors[node.branch] || '#7c5cfc';

  const statusIcon = { 'Done': '\u2705', 'In Progress': '\uD83D\uDD04', 'Shipped': '\uD83D\uDE80', 'Locked': '\uD83D\uDD12', 'Not Started': '\u26AA' };

  const depsHtml = (node.depends || []).length > 0
    ? node.depends.map(d => {
        const dep = getNodeById(d);
        return dep ? `<div class="detail-dep-item" onclick="openDetailById('${d}')">${dep.name} ${statusIcon[dep.status] || ''}</div>` : '';
      }).join('')
    : '<span style="color:var(--text-dim);font-size:12px">None — root node</span>';

  const unlocksHtml = (node.unlocks || []).length > 0
    ? node.unlocks.map(u => {
        const un = getNodeById(u);
        return un ? `<div class="detail-unlocks-item" onclick="openDetailById('${u}')">${un.name}</div>` : '';
      }).join('')
    : '<span style="color:var(--text-dim);font-size:12px">End node</span>';

  const blockersHtml = node.blockers
    ? `<div class="detail-section"><div class="detail-section-title">\u26A0\uFE0F Blockers</div><div class="blocker-badge">${node.blockers}</div></div>`
    : '';

  content.innerHTML = `
    <div class="detail-branch-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${node.branch}</div>
    <div class="detail-title">${node.name}</div>
    <div class="detail-phase">Phase ${node.phase} &middot; ${(node.team || []).join(', ')}</div>

    <div class="detail-row"><span class="detail-row-label">Status</span><span class="detail-row-value">${node.status}</span></div>
    <div class="detail-row"><span class="detail-row-label">Priority</span><span class="detail-row-value">${node.priority}</span></div>
    <div class="detail-row"><span class="detail-row-label">Est. Cost</span><span class="detail-row-value">${node.cost > 0 ? '$' + node.cost.toLocaleString() : 'N/A'}</span></div>
    <div class="detail-row"><span class="detail-row-label">Duration</span><span class="detail-row-value">${node.duration || '—'}</span></div>

    ${blockersHtml}

    <div class="detail-section" style="margin-top:20px">
      <div class="detail-section-title">Notes</div>
      <div class="detail-section-content">${node.notes || '—'}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Depends On</div>
      <div class="detail-deps">${depsHtml}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Unlocks</div>
      <div class="detail-deps">${unlocksHtml}</div>
    </div>
  `;

  panel.classList.add('open');
}

function openDetailById(id) {
  const node = getNodeById(id);
  if (node) openDetail(node);
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedNode = null;
}

function filterPhase(phase) {
  currentPhase = phase;
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.phase-tab[data-phase="${phase}"]`).classList.add('active');
  renderConnections();
  renderNodes();
}

// ===== PAN & ZOOM =====
let scale = 0.85, panX = 0, panY = 0;
let isPanning = false, startX, startY;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

const container = document.getElementById('canvasContainer');

container.addEventListener('mousedown', e => {
  if (e.target.closest('.node') || e.target.closest('.detail-panel')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
});

window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});

window.addEventListener('mouseup', () => { isPanning = false; });

container.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  scale = Math.max(0.3, Math.min(2, scale + delta));
  applyTransform();
}, { passive: false });

function zoomIn() { scale = Math.min(2, scale + 0.1); applyTransform(); }
function zoomOut() { scale = Math.max(0.3, scale - 0.1); applyTransform(); }
function resetView() { scale = 0.85; panX = 0; panY = 0; applyTransform(); }

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === '1') filterPhase('1');
  if (e.key === '2') filterPhase('2');
  if (e.key === '3') filterPhase('3');
  if (e.key === '4') filterPhase('4');
  if (e.key === '0') filterPhase('all');
  if (e.key === 'r') fetchNodes();
});

// ===== INIT =====
applyTransform();
fetchNodes();

// Auto-refresh
setInterval(fetchNodes, AUTO_REFRESH_MS);
</script>
</body>
</html>
